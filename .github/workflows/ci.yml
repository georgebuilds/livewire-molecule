name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  tests:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ["8.3", "8.4"]
        laravel: ["10", "11", "12", "13"]
        include:
          - laravel: "10"
            testbench: "^8.0"
            illuminate: "^10.0"
          - laravel: "11"
            testbench: "^9.0"
            illuminate: "^11.0"
          - laravel: "12"
            testbench: "^10.0"
            illuminate: "^12.0"
          - laravel: "13"
            testbench: "^11.0"
            illuminate: "^13.0"

    name: "PHP ${{ matrix.php }} / Laravel ${{ matrix.laravel }}"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "${{ matrix.php }}"
          tools: composer
          coverage: none

      - name: Require specific Laravel and Testbench versions
        run: |
          composer require \
            "illuminate/support:${{ matrix.illuminate }}" \
            "orchestra/testbench:${{ matrix.testbench }}" \
            --no-interaction \
            --no-update

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Run PHPStan
        run: ./vendor/bin/phpstan analyse --level=10 --memory-limit=512M

      - name: Run Pest
        run: ./vendor/bin/pest --parallel
